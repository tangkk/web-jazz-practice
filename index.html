<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jazz Practice — 现在练什么</title>
  <meta name="description" content="一个纯前端的爵士乐练习推荐器：支持随机，也支持减少练习决策疲劳。" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <p class="eyebrow">JAZZ PRACTICE</p>
      <h1>现在练什么</h1>
      <div class="manifesto">
        <p class="manifesto-en">Good practice is not about doing everything. It is about choosing the right next thing.</p>
        <p class="manifesto-zh">好的练习，不是把所有东西都练一遍，而是先做对当下最值得做的下一件事。</p>
      </div>
    </header>

    <hr class="section-rule" />

    <div class="workspace-grid" id="workspaceGrid">
      <section class="panel controls-panel">
        <div class="panel-head">
          <h2 class="panel-title">条件设置</h2>
          <p class="panel-note">可全部留空；系统会在默认条件下给出推荐。</p>
        </div>

        <div class="controls-grid">
          <label>
            <span data-i18n-label="language">语言</span>
            <select id="language">
              <option value="zh" data-i18n-option="langZh">中文</option>
              <option value="en" data-i18n-option="langEn">English</option>
            </select>
          </label>

          <label>
            <span data-i18n-label="duration">现在有多少时间</span>
            <select id="duration">
              <option value="" data-i18n-option="any">随意</option>
              <option value="10" data-i18n-option="duration10">10 分钟</option>
              <option value="20" data-i18n-option="duration20">20 分钟</option>
              <option value="30" data-i18n-option="duration30">30 分钟</option>
              <option value="60" data-i18n-option="duration60">60 分钟</option>
            </select>
          </label>

          <label>
            <span data-i18n-label="focus">现在想偏重什么</span>
            <select id="focus">
              <option value="" data-i18n-option="any">随意</option>
              <option value="time" data-i18n-option="focusTime">节奏 / time</option>
              <option value="harmony" data-i18n-option="focusHarmony">和声 / comping</option>
              <option value="fretboard" data-i18n-option="focusFretboard">指板 / 音阶 / 琶音</option>
              <option value="improv" data-i18n-option="focusImprov">即兴 / 语言</option>
              <option value="ear" data-i18n-option="focusEar">耳朵 / 听写 / 唱</option>
              <option value="repertoire" data-i18n-option="focusRepertoire">曲目 / melody / form</option>
              <option value="dominant-colors" data-i18n-option="focusDominant">dominant colors</option>
              <option value="modern" data-i18n-option="focusModern">modern / quartal / modal</option>
            </select>
          </label>

          <label>
            <span data-i18n-label="energy">现在状态</span>
            <select id="energy">
              <option value="" data-i18n-option="any">随意</option>
              <option value="low" data-i18n-option="energyLow">低状态</option>
              <option value="medium" data-i18n-option="energyMedium">一般</option>
              <option value="high" data-i18n-option="energyHigh">高状态</option>
            </select>
          </label>

          <label>
            <span data-i18n-label="bias">推荐倾向</span>
            <select id="bias">
              <option value="general" data-i18n-option="biasBeginner">入门</option>
              <option value="balanced" data-i18n-option="biasIntermediate">进阶</option>
              <option value="personal" data-i18n-option="biasAdvanced">高手</option>
            </select>
          </label>

          <label class="full-span">
            <span data-i18n-label="preference">补充偏好（可选）</span>
            <input id="preferenceInput" type="text" placeholder="比如：最近想多练 comping / 难度适中 / 更偏 blues / 暂不推荐 rhythm changes" />
          </label>
        </div>

        <div class="actions">
          <button id="generateBtn" class="btn btn-primary">生成推荐</button>
          <button id="lightBtn" class="btn btn-secondary">轻一些</button>
          <button id="deepBtn" class="btn btn-secondary">深入一些</button>
        </div>

        <section class="metronome-panel desktop-only">
          <h4 data-i18n-section="metronome">Metronome</h4>
          <div class="metronome-embed">
            <iframe src="https://tangkk.github.io/web-justmetronome/?embed=1" title="JustMetronome" loading="lazy"></iframe>
          </div>
        </section>
      </section>

      <section class="panel result-panel" id="resultPanel">
        <div class="panel-head">
          <h2 class="panel-title">当前练习</h2>
        </div>

        <div class="result-empty" id="emptyState">
          <p>点击生成后，系统会根据当前条件给出一组练习建议。</p>
        </div>

        <div class="result hidden" id="resultState">
          <div class="result-header">
            <p class="result-kicker" id="resultKicker"></p>
            <h3 class="result-title" id="resultTitle"></h3>
            <p class="result-summary" id="resultSummary"></p>
          </div>

          <div class="routine-block">
            <h4 data-i18n-section="routine">练习安排</h4>
            <ol id="stepsList"></ol>
          </div>

          <div class="tune-block">
            <h4 data-i18n-section="tune">可搭配曲目</h4>
            <p id="resultTune"></p>
            <div class="tune-actions hidden" id="tuneActions">
              <button id="toggleChartBtn" class="link-btn" type="button">展开 chart</button>
              <button id="openRealbookBtn" class="link-btn" type="button">打开 web-realbook</button>
              <button id="openTranscriberBtn" class="link-btn" type="button">打开 transcriber</button>
            </div>
          </div>

          <section class="chart-panel hidden" id="chartPanel">
            <div class="panel-head chart-head-inline">
              <h2 class="panel-title" data-i18n-section="chart">Chart</h2>
            </div>
            <div class="chart-preview" id="chartPreview"></div>
          </section>
        </div>
      </section>
    </div>
  </main>

  <script src="./data/practice-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
